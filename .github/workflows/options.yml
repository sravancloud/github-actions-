name: Timeout Example

on: [Push]
concurrency:
   group: ${{ github.repository }}-${{ github.ref }}
   cancel-in-progress: true

jobs:
  test-timeout:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Start job
        run: echo "This job will timeout if it run longer than 5 minutes"

      - name: Simulate Long Task
        run: |
          echo "Sleeping for 10 minutes..."
          sleep 400   # 400 seconds (~6.5 min) → will exceed timeout
         